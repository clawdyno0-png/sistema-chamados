<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta - Sistema de Chamados</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Criar conta</h1>
      <p>Cadastre um novo acesso para utilizar o sistema de gestão de chamados.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div style="margin-bottom: 18px;">
            {% for category, message in messages %}
              <div class="flash-message flash-{{ category }}" style="margin-bottom: 10px;">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input
            id="username"
            class="form-control"
            type="text"
            name="username"
            placeholder="Escolha um nome de usuário"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            id="password"
            class="form-control"
            type="password"
            name="password"
            placeholder="Crie uma senha"
            required
          >
        </div>

        <div class="form-group">
          <label for="tipo">Tipo de conta</label>
          <select id="tipo" name="tipo" class="form-control" required>
            <option value="usuario">Usuário</option>
            <option value="analista">Analista</option>
          </select>
        </div>

        <div class="form-group" id="grupo-chave-analista" style="display: none;">
          <label for="chave_analista">Chave de validação do analista</label>
          <input
            id="chave_analista"
            class="form-control"
            type="password"
            name="chave_analista"
            placeholder="Digite a chave de validação"
          >
        </div>

        <button class="btn" type="submit">
          Cadastrar usuário
        </button>
      </form>

      <div class="auth-footer">
        Já tem conta?
        <a href="/login">Voltar para login</a>
      </div>
    </div>
  </div>

  <script>
    const tipoSelect = document.getElementById("tipo");
    const grupoChaveAnalista = document.getElementById("grupo-chave-analista");
    const campoChaveAnalista = document.getElementById("chave_analista");

    function alternarCampoAnalista() {
      if (tipoSelect.value === "analista") {
        grupoChaveAnalista.style.display = "flex";
        campoChaveAnalista.required = true;
      } else {
        grupoChaveAnalista.style.display = "none";
        campoChaveAnalista.required = false;
        campoChaveAnalista.value = "";
      }
    }

    tipoSelect.addEventListener("change", alternarCampoAnalista);
    alternarCampoAnalista();
  </script>

</body>
</html>
