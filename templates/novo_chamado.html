{% extends "base.html" %}

{% block title %}Novo Chamado{% endblock %}

{% block page_title %}Abrir novo chamado{% endblock %}
{% block page_subtitle %}
Preencha as informações abaixo para registrar uma nova solicitação.
{% endblock %}

{% block content %}
<div class="content-section">
  <h2>Dados do chamado</h2>

  <form method="POST">
    <div class="form-group">
      <label for="titulo">Título</label>
      <input
        id="titulo"
        class="form-control"
        type="text"
        name="titulo"
        placeholder="Ex.: Computador não liga"
        required
      >
    </div>

    <div class="form-group">
      <label for="descricao">Descrição</label>
      <textarea
        id="descricao"
        class="form-control"
        name="descricao"
        placeholder="Descreva o problema com o máximo de detalhes possível"
        required
      ></textarea>
    </div>

    <div class="filter-row">
      <div class="form-group">
        <label for="categoria">Categoria</label>
        <select id="categoria" name="categoria" class="form-control" required>
          <option value="">Selecione uma categoria</option>
          <option value="TI">TI</option>
          <option value="Financeiro">Financeiro</option>
          <option value="RH">RH</option>
          <option value="Suporte">Suporte</option>
          <option value="Infraestrutura">Infraestrutura</option>
        </select>
      </div>

      <div class="form-group">
        <label for="prioridade">Prioridade</label>
        <select id="prioridade" name="prioridade" class="form-control" required>
          <option value="">Selecione a prioridade</option>
          <option value="Baixa">Baixa</option>
          <option value="Média">Média</option>
          <option value="Alta">Alta</option>
        </select>
      </div>
    </div>

    <div class="actions-row" style="margin-top: 8px;">
      <button class="btn" type="submit">
        Abrir chamado
      </button>

      <a class="btn btn-secondary-header" href="{{ url_for('meus_chamados') }}">
        Cancelar
      </a>
    </div>
  </form>
</div>
{% endblock %}
